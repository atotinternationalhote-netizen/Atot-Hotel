<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot Hotel</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: sans-serif;
            background-color: #050a18 !important;
            color: #ffffff !important;
            overflow: hidden;
        }
        .container {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            background: radial-gradient(circle at center, #0a1931 0%, #050c1a 100%) !important;
        }
        .title { font-size: 3rem; font-weight: 800; margin-bottom: 20px; }
        .btn {
            padding: 15px 30px; font-size: 1rem; font-weight: 700;
            border-radius: 50px; cursor: pointer; border: 2px solid #0066ff;
            background: transparent; color: #ffffff; transition: 0.3s;
        }
        .btn:hover { background: #0066ff; }
        
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #0a1931; padding: 40px; border-radius: 20px;
            max-width: 400px; width: 85%; text-align: left; position: relative;
        }
        .close { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Atot Hotel</h1>
        <button class="btn" onclick="document.getElementById('m').style.display='flex'">Our Services</button>
    </div>

    <div id="m" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('m').style.display='none'">&times;</span>
            <h2>Our Services</h2>
            <p>• Luxury Rooms</p>
            <p>• Restaurant & Bar</p>
            <p>• Conference Hall</p>
        </div>
    </div>

</body>
</html>
