<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; }
        
        /* Deep Blue Background Setup */
        body {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            background-attachment: fixed;
            color: #ffffff;
        }

        .hero-viewport {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
            padding: 0 10%;
        }

        .hero-title { font-size: 4rem; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
        .hero-desc { font-size: 1.2rem; color: #a0c4ff; max-width: 500px; margin-bottom: 30px; }

        .btn-blue { padding: 15px 30px; background-color: #007bff; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-outline { padding: 15px 30px; background: transparent; border: 2px solid #007bff; color: #007bff; border-radius: 5px; margin-left: 15px; cursor: pointer; }
        
        /* Modal styling */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 7, 20, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #002244; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%;
        }
        .service-card { margin-bottom: 20px; }
        .service-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="hero-viewport">
        <h1 class="hero-title">The Heart of <br> Atot Business</h1>
        <p class="hero-desc">A premier commercial complex purpose-built for enterprises, startups, and corporate teams shaping the future of business.</p>
        
        <div>
            <button class="btn-blue" onclick="location.href='https://t.me/Zeru_Re'">Book a Space</button>
            <button class="btn-outline" onclick="openServices()">Discover Atot</button>
        </div>
    </div>

    <div id="servicesModal" class="modal-overlay" onclick="closeServices()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="text-align:center;">Our Services</h2>
            <div class="service-card">
                <img src="Screenshot_20260626_184308_Maps.jpg" alt="Room">
                <h3>Luxury Rooms</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184340_Maps.jpg" alt="Food">
                <h3>Restaurant & Bar</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184329_Maps.jpg" alt="Hall">
                <h3>Conference Hall</h3>
            </div>
        </div>
    </div>

    <script>
        function openServices() { document.getElementById('servicesModal').classList.add('active'); }
        function closeServices() { document.getElementById('servicesModal').classList.remove('active'); }
    </script>
</body>
</html>
