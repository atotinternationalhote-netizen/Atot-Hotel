<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #050a18; color: #ffffff; }

        body {
            background-image: url('Screenshot_20260626_184340_Maps.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-viewport {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            background: radial-gradient(circle at center, rgba(10, 25, 49, 0.8) 0%, rgba(5, 10, 24, 0.95) 100%);
        }

        .hero-title { font-size: 3.2rem; font-weight: 800; margin: 0 0 20px 0; }
        .custom-btn { padding: 16px 32px; font-weight: 700; border-radius: 50px; text-decoration: none; cursor: pointer; border: none; margin: 10px; }
        .btn-blue { background-color: #0066ff; color: #ffffff; }
        .btn-outline { background-color: transparent; color: #ffffff; border: 2px solid #ffffff; }

        /* Modal styling */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 50, 100, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #ffffff; color: #050a18; padding: 30px;
            border-radius: 20px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .service-card { margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .service-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hero-viewport">
        <h1 class="hero-title">Atot International Hotel</h1>
        <p>Experience ultimate luxury in the heart of Worabe.</p>
        <div class="button-group">
            <a href="https://t.me/Zeru_Re" class="custom-btn btn-blue">Book Now</a>
            <button onclick="openServices()" class="custom-btn btn-outline">Our Services</button>
        </div>
    </div>

    <div id="servicesModal" class="modal-overlay" onclick="closeServices()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:#0066ff; text-align:center;">Our Services</h2>
            
            <div class="service-card">
                <img src="Screenshot_20260626_184308_Maps.jpg" alt="Room">
                <h3>Luxury Rooms</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184340_Maps.jpg" alt="Food">
                <h3>Restaurant & Bar</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184329_Maps.jpg" alt="Hall">
                <h3>Conference Hall</h3>
            </div>
        </div>
    </div>

    <script>
        function openServices() { document.getElementById('servicesModal').classList.add('active'); }
        function closeServices() { document.getElementById('servicesModal').classList.remove('active'); }
    </script>
</body>
</html>
