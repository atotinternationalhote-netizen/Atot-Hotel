<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        /* Global Styles */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #050a18; }
        body {
            background-image: url('Screenshot_20260626_184340_Maps.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* The blue interface layer - This recreates your original look */
        .hero-viewport {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            background: radial-gradient(circle at center, rgba(5, 15, 35, 0.9) 0%, rgba(5, 10, 24, 0.98) 100%);
        }

        .hero-title { font-size: 3.5rem; font-weight: 800; color: #ffffff; margin-bottom: 20px; }
        .hero-desc { font-size: 1.2rem; color: #8fa0bc; max-width: 600px; margin-bottom: 40px; }

        .btn-blue { padding: 16px 32px; border-radius: 50px; background-color: #0066ff; color: #ffffff; font-weight: 700; border: none; cursor: pointer; }
        .btn-outline { padding: 16px 32px; border-radius: 50px; background: transparent; color: #ffffff; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; margin-left: 15px; }

        /* Modal styling */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 24, 0.9);
            backdrop-filter: blur(15px); /* This creates the glass effect */
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #0a1931; border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff; padding: 30px; border-radius: 24px; max-width: 500px; width: 90%;
        }
        .service-card { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .service-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="hero-viewport">
        <h1 class="hero-title">Atot International Hotel</h1>
        <p class="hero-desc">Experience ultimate luxury and top-tier hospitality in the heart of Worabe.</p>
        
        <div class="button-group">
            <button class="btn-blue" onclick="location.href='https://t.me/Zeru_Re'">Book Now</button>
            <button class="btn-outline" onclick="openServices()">Our Services</button>
        </div>
    </div>

    <div id="servicesModal" class="modal-overlay" onclick="closeServices()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:#0066ff; text-align:center;">Our Services</h2>
            
            <div class="service-card">
                <img src="Screenshot_20260626_184308_Maps.jpg" alt="Room">
                <h3>Luxury Rooms</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184340_Maps.jpg" alt="Food">
                <h3>Restaurant & Bar</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184329_Maps.jpg" alt="Hall">
                <h3>Conference Hall</h3>
            </div>
        </div>
    </div>

    <script>
        function openServices() { document.getElementById('servicesModal').classList.add('active'); }
        function closeServices() { document.getElementById('servicesModal').classList.remove('active'); }
    </script>
</body>
</html>
