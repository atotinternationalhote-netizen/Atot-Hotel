<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #050a18; 
            color: #ffffff;
        }
        .hero-viewport {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            background: radial-gradient(circle at center, rgba(10, 25, 49, 0.8) 0%, rgba(5, 10, 24, 0.95) 100%);
        }
        h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; }
        p { font-size: 1.2rem; color: #8fa0bc; margin-bottom: 40px; }
        
        .btn-blue {
            padding: 16px 32px; border-radius: 50px; border: none;
            background-color: #0066ff; color: #ffffff; font-weight: 700; cursor: pointer;
            text-decoration: none;
        }
        .btn-outline {
            padding: 16px 32px; border-radius: 50px; background: transparent; 
            color: #ffffff; border: 2px solid #ffffff; cursor: pointer; margin-left: 15px;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 50, 100, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #ffffff; color: #050a18; padding: 30px;
            border-radius: 20px; max-width: 500px; width: 90%;
        }
        .service-card { margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .service-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="hero-viewport">
        <h1>Atot International Hotel</h1>
        <p>Experience luxury in the heart of Worabe.</p>
        <div>
            <a href="https://t.me/Zeru_Re" class="btn-blue">Book Now</a>
            <button class="btn-outline" onclick="openServices()">Our Services</button>
        </div>
    </div>

    <div id="servicesModal" class="modal-overlay" onclick="closeServices()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:#0066ff; text-align:center;">Our Services</h2>
            <div class="service-card">
                <img src="Screenshot_20260626_184308_Maps.jpg" alt="Room">
                <h3>Luxury Rooms</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184340_Maps.jpg" alt="Food">
                <h3>Delicious Food</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184329_Maps.jpg" alt="Hall">
                <h3>Meeting Hall</h3>
            </div>
        </div>
    </div>

    <script>
        function openServices() { document.getElementById('servicesModal').classList.add('active'); }
        function closeServices() { document.getElementById('servicesModal').classList.remove('active'); }
    </script>
</body>
</html>
