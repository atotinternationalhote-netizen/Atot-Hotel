<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        /* Modern Deep Blue Interface */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: #ffffff;
        }

        .hero-viewport {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .hero-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
        .hero-desc { font-size: 1.2rem; color: #a0c4ff; max-width: 600px; margin-bottom: 40px; }

        .btn-blue { padding: 16px 32px; border-radius: 8px; background-color: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-outline { padding: 16px 32px; border-radius: 8px; background: transparent; color: #ffffff; border: 2px solid #007bff; cursor: pointer; margin-left: 15px; }

        /* Modal styling */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 7, 20, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #002244; padding: 30px; border-radius: 15px; 
            max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
        .service-card { margin-bottom: 20px; border-bottom: 1px solid #004488; padding-bottom: 15px; }
        .service-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="hero-viewport">
        <h1 class="hero-title">Atot International Hotel</h1>
        <p class="hero-desc">Experience ultimate luxury and top-tier hospitality in the heart of Worabe.</p>
        
        <div class="button-group">
            <button class="btn-blue" onclick="location.href='https://t.me/Zeru_Re'">Book Now</button>
            <button class="btn-outline" onclick="openServices()">Our Services</button>
        </div>
    </div>

    <div id="servicesModal" class="modal-overlay" onclick="closeServices()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:#007bff; text-align:center;">Our Services</h2>
            
            <div class="service-card">
                <img src="Screenshot_20260626_184308_Maps.jpg" alt="Room">
                <h3>Luxury Rooms</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184340_Maps.jpg" alt="Food">
                <h3>Restaurant & Bar</h3>
            </div>
            <div class="service-card">
                <img src="Screenshot_20260626_184329_Maps.jpg" alt="Hall">
                <h3>Conference Hall</h3>
            </div>
        </div>
    </div>

    <script>
        function openServices() { document.getElementById('servicesModal').classList.add('active'); }
        function closeServices() { document.getElementById('servicesModal').classList.remove('active'); }
    </script>
</body>
</html>
