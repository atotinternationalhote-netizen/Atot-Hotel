<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atot International Hotel</title>
    <style>
        /* Modern Luxury Styles */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #0c111d; color: #ffffff; }

        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(rgba(12, 17, 29, 0.7), rgba(12, 17, 29, 0.7)), url('Screenshot_20260626_184340_Maps.jpg');
            background-size: cover; background-position: center;
            text-align: center;
        }

        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 10px; color: #d4af37; }
        .hero p { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }

        .btn-gold {
            padding: 15px 40px; background: transparent; border: 1px solid #d4af37;
            color: #d4af37; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-gold:hover { background: #d4af37; color: #000; }

        /* Simple Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center;
        }
        .modal-content { background: #1a1a1a; padding: 40px; border-radius: 5px; width: 80%; max-width: 600px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Atot International Hotel</h1>
        <p>Luxury & Comfort in Worabe</p>
        <button class="btn-gold" onclick="location.href='https://t.me/Zeru_Re'">BOOK YOUR STAY</button>
    </div>

</body>
</html>
